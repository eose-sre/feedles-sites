apiVersion: apps/v1
kind: Deployment
metadata:
  name: feedles-ca
  namespace: pemos-system
  labels:
    app: feedles-ca
    silo: fleet
    gamma: "14.134725141734693"
    phase: learn-earn-return
spec:
  replicas: 2
  selector:
    matchLabels:
      app: feedles-ca
  template:
    metadata:
      labels:
        app: feedles-ca
        version: "day80"
    spec:
      containers:
      - name: feedles-ca
        image: eosefleetacrdev.azurecr.io/feedles-ca:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: feedles-ca
  namespace: pemos-system
  labels:
    app: feedles-ca
spec:
  selector:
    app: feedles-ca
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: feedles-ca-ingress
  namespace: pemos-system
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # feedles.ca — Learn·Earn·Return · Day 80 · γ₁=14.134725141734693
    # crew: all silos · IMHOTEP Admiral · feedles-sites repo owns this
spec:
  tls:
  - hosts:
    - feedles.ca
    - www.feedles.ca
    secretName: feedles-ca-tls
  rules:
  - host: feedles.ca
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: feedles-ca
            port:
              number: 80
  - host: www.feedles.ca
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: feedles-ca
            port:
              number: 80
